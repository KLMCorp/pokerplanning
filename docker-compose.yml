# =============================================================================
# Poker Planning - Docker Compose (clone depuis Git)
# =============================================================================
# Dûˋploiement standalone : clone le code depuis un dûˋpûÇt Git, build et lance
# l'application. Pas de reverse proxy (Traefik, Nginx, etc.).
#
# Usage :
#   1. Copier .env.example en .env et configurer les variables
#   2. docker compose -f docker-compose.yml up -d --build
#
# Rebuild aprû´s mise û  jour du code :
#   docker compose -f docker-compose.yml build --no-cache
#   docker compose -f docker-compose.yml up -d

services:
  poker-planning:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - GIT_REPO=${GIT_REPO:-https://your-git-server/PlanningPoker.git}
        - GIT_BRANCH=${GIT_BRANCH:-latest}
        # --- Build Next.js (inlinûˋs dans le bundle client) ---
        - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3001}
        - NEXT_PUBLIC_CARDS_PATH=${NEXT_PUBLIC_CARDS_PATH:-/images/cartes}
        - APP_VERSION=${APP_VERSION:-1.0.0}
        - ALLOW_UPLOADS=${ALLOW_UPLOADS:-true}
    container_name: poker-planning
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${HOST_PORT_WEB:-3000}:3000"    # Next.js
      - "${HOST_PORT_WS:-3001}:3001"     # Socket.IO
    environment:
      # --- Application ---
      - APP_NAME=${APP_NAME:-Poker Planning}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - PORT=3001
      - CORS_ORIGINS=${CORS_ORIGINS:-}

      # --- SMTP (optionnel) ---
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}

      # --- Donnûˋes ---
      - DATA_DIR=/app/data
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3001}
      - NEXT_PUBLIC_CARDS_PATH=${NEXT_PUBLIC_CARDS_PATH:-/images/cartes}

      # --- Limites ---
      - MAX_PARTICIPANTS_PER_ROOM=${MAX_PARTICIPANTS_PER_ROOM:-0}
      - ROOM_TTL_MINUTES=${ROOM_TTL_MINUTES:-180}
      - ALLOW_UPLOADS=${ALLOW_UPLOADS:-true}

      # --- Administration ---
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_SECRET_PATH=${ADMIN_SECRET_PATH:-}
    volumes:
      - poker-data:/app/data
      - poker-uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  poker-data:
    driver: local
  poker-uploads:
    driver: local
